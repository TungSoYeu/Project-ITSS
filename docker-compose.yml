services:
  postgres:
    image: postgres:15
    container_name: ooas-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ooas}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    ports:
      - "5432:5432"
    volumes:
      - ooas-postgres-data:/var/lib/postgresql/data
      - ./db/migration:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ooas-backend
    restart: always
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ooas}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-admin}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  ooas-postgres-data:
