services:
  postgres:
    image: postgres:15
    container_name: ooas-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ooas_spring}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - ooas-postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ooas-backend
    restart: always
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ooas_spring}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-24h}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    container_name: ooas-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  ooas-postgres-data:
